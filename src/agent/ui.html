<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vulnerability Registry Agent</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 800px;
        width: 100%;
        padding: 40px;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 24px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .input-section {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 30px;
      }

      label {
        display: block;
        color: #333;
        font-weight: 500;
        font-size: 14px;
      }

      textarea {
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-family: inherit;
        font-size: 14px;
        min-height: 100px;
        resize: vertical;
        transition: border-color 0.2s;
      }

      textarea:focus {
        outline: none;
        border-color: #667eea;
      }

      textarea:disabled {
        background-color: #f5f5f5;
        cursor: not-allowed;
      }

      .button-group {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .submit-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .submit-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
      }

      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .clear-btn {
        background: #f0f0f0;
        color: #333;
      }

      .clear-btn:hover:not(:disabled) {
        background: #e0e0e0;
      }

      .loading {
        display: none;
        text-align: center;
        margin: 20px 0;
      }

      .spinner {
        display: inline-block;
        width: 24px;
        height: 24px;
        border: 3px solid #f0f0f0;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        display: none;
        background: #fee;
        border: 1px solid #fcc;
        border-radius: 8px;
        padding: 16px;
        margin: 20px 0;
        color: #c33;
        font-size: 14px;
      }

      .error.show {
        display: block;
      }

      .answer-section {
        display: none;
        margin-top: 30px;
      }

      .answer-section.show {
        display: block;
      }

      .answer-label {
        color: #333;
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 12px;
      }

      .answer-text {
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 16px;
        color: #333;
        line-height: 1.6;
        font-size: 14px;
        white-space: pre-wrap;
        word-wrap: break-word;
        max-height: 400px;
        overflow-y: auto;
      }

      .trace-toggle {
        margin-top: 16px;
        padding: 0;
        background: transparent;
        color: #667eea;
        font-size: 13px;
        text-decoration: underline;
        cursor: pointer;
        border: none;
        transition: color 0.2s;
      }

      .trace-toggle:hover {
        color: #764ba2;
      }

      .trace-content {
        display: none;
        background: #f5f5f5;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 12px;
        margin-top: 12px;
        font-size: 12px;
        color: #666;
        font-family: 'Monaco', 'Menlo', monospace;
        max-height: 200px;
        overflow-y: auto;
      }

      .trace-content.show {
        display: block;
      }

      .trace-item {
        margin: 8px 0;
        padding: 8px;
        background: white;
        border-radius: 4px;
        border-left: 2px solid #667eea;
      }

      .trace-item-name {
        font-weight: 600;
        color: #333;
      }

      .trace-item-args {
        color: #666;
        margin-top: 4px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔍 Vulnerability Registry</h1>
      <p class="subtitle">Ask questions about CVEs, vendors, and vulnerabilities</p>

      <div class="input-section">
        <label for="question">Your question:</label>
        <textarea
          id="question"
          placeholder='Examples:&#10;"What is CVE-2021-44228?"&#10;"Which vendor has more critical vulnerabilities — Apache or Linux Kernel?"&#10;"Show me the top 5 critical open vulnerabilities"'
        ></textarea>
        <div class="button-group">
          <button class="submit-btn" id="submitBtn">Ask</button>
          <button class="clear-btn" id="clearBtn">Clear</button>
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 12px; color: #666; font-size: 14px">Thinking...</p>
      </div>

      <div class="error" id="error"></div>

      <div class="answer-section" id="answerSection">
        <div class="answer-label">Answer:</div>
        <div class="answer-text" id="answerText"></div>
        <button class="trace-toggle" id="traceToggle">Show tool calls</button>
        <div class="trace-content" id="traceContent"></div>
      </div>
    </div>

    <script>
      const questionInput = document.getElementById('question');
      const submitBtn = document.getElementById('submitBtn');
      const clearBtn = document.getElementById('clearBtn');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const answerSection = document.getElementById('answerSection');
      const answerText = document.getElementById('answerText');
      const traceToggle = document.getElementById('traceToggle');
      const traceContent = document.getElementById('traceContent');

      let toolCalls = [];

      submitBtn.addEventListener('click', async () => {
        const question = questionInput.value.trim();

        if (!question) {
          showError('Please enter a question.');
          return;
        }

        if (question.length > 1000) {
          showError('Question is too long (max 1000 characters).');
          return;
        }

        await askQuestion(question);
      });

      clearBtn.addEventListener('click', () => {
        questionInput.value = '';
        error.classList.remove('show');
        answerSection.classList.remove('show');
        questionInput.focus();
      });

      traceToggle.addEventListener('click', () => {
        traceContent.classList.toggle('show');
        traceToggle.textContent = traceContent.classList.contains('show')
          ? 'Hide tool calls'
          : 'Show tool calls';
      });

      questionInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) {
          submitBtn.click();
        }
      });

      async function askQuestion(question) {
        // Hide error and answer, show loading
        error.classList.remove('show');
        answerSection.classList.remove('show');
        loading.style.display = 'block';
        submitBtn.disabled = true;
        questionInput.disabled = true;
        toolCalls = [];

        try {
          const response = await fetch('/api/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question }),
          });

          if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error || 'Failed to get an answer');
          }

          const data = await response.json();
          displayAnswer(data.answer);
        } catch (err) {
          showError(err instanceof Error ? err.message : 'An unexpected error occurred.');
        } finally {
          loading.style.display = 'none';
          submitBtn.disabled = false;
          questionInput.disabled = false;
        }
      }

      function displayAnswer(answer) {
        answerText.textContent = answer;
        answerSection.classList.add('show');

        // Reset trace toggle
        traceContent.classList.remove('show');
        traceToggle.textContent = 'Show tool calls';
      }

      function showError(message) {
        error.textContent = message;
        error.classList.add('show');
      }

      // Focus on load
      questionInput.focus();
    </script>
  </body>
</html>
